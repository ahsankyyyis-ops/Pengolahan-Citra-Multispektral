<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMinX - Multi-Band Mineral Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #475569;
            --success: #22c55e;
            --panel-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { display: flex; height: 100vh; background-color: #f1f5f9; color: #1e293b; overflow: hidden; }
        
        /* SIDEBAR PANEL KONTROL */
        #sidebar { 
            width: 380px; 
            background: var(--bg-secondary); 
            color: var(--text-main); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.1); 
            z-index: 10; 
            overflow-y: auto; 
        }
        
        .brand h2 { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .brand p { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
        hr { border: 0; border-top: 1px solid #334155; }
        
        .step-card {
            background: var(--bg-primary);
            border: 1px solid #334155;
            padding: 16px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .step-title { font-size: 0.9rem; font-weight: 600; color: #cbd5e1; }
        
        /* MULTI-BAND UPLOAD GRID */
        .band-upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .band-box {
            border: 1px dashed #475569;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            background: #020617;
            cursor: pointer;
            font-size: 0.75rem;
            color: #94a3b8;
            transition: all 0.2s;
        }
        .band-box:hover { border-color: var(--accent); color: white; }
        .band-box.loaded { border-color: var(--success); color: var(--success); background: #052e16; }
