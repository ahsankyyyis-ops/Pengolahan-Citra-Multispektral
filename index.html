<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMinX Core v2 - Fixed Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #090d16;
            --bg-secondary: #111827;
            --accent: #38bdf8;
            --success: #10b981;
            --text-main: #f3f4f6;
            --border: #1f2937;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { display: flex; height: 100vh; background-color: #030712; color: var(--text-main); overflow: hidden; }
        
        /* SIDEBAR PANEL KONTROL */
        #sidebar { 
            width: 380px; 
            background: var(--bg-secondary); 
            border-right: 1px solid var(--border);
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            overflow-y: auto; 
        }
        
        .brand h2 { font-size: 1.4rem; font-weight: 700; color: var(--accent); opacity: 0.95; }
        .brand p { font-size: 0.75rem; color: #6b7280; margin-top: 2px; }
        hr { border: 0; border-top: 1px solid var(--border); }
        
        .step-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step-title { font-size: 0.85rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* FIX INPUT GRID: Input file dibuat terlihat sebagai tombol asli */
        .band-upload-grid { display: flex; flex-direction: column; gap: 10px; }
        .band-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #030712;
            border: 1px solid #374151;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .band-label { font-size: 0.8rem; font-weight: 600; color: #9ca3af; }
        .file-btn {
            font-size: 0.75rem;
            color: #white;
            background: #1f2937;
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid #4b5563;
            cursor: pointer;
            max-width: 160px;
        }
        .band-row.loaded { border-color: var(--success); background: #064e3b; }
        .band-row.loaded .band-label { color: #a7f3d0; }

        select, .btn { 
            width: 100%; padding: 12px; border-radius: 6px; font-size: 0.9rem; font-weight: 600; outline: none; border: none; transition: all 0.2s;
        }
        select { background: #030712; color: white; border: 1px solid var(--border); cursor: pointer; }
        
        .btn-primary { background: var(--accent); color: #030712; cursor: pointer; }
        .btn-primary:hover { background: #7dd3fc; }
        .btn-success { background: var(--success); color: white; display: none; margin-top: 10px; cursor: pointer; text-align: center; text-decoration: none;}

        /* LOADING ANIMATION */
        #loading-container { display: none; margin-top: 10px; }
        .progress-bar { width: 100%; height: 4px; background: #1f2937; border-radius: 10px; overflow: hidden; margin-top: 6px; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); animation: load 2s linear forwards; }
        @keyframes load { to { width: 100%; } }

        /* AREA UTAMA (KANAN) */
        #main-content { flex-grow: 1; padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .dashboard-header h1 { font-size: 1.3rem; font-weight: 600; }

        /* ARTIFAK PREVIEW PANEL */
        .workspace-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .display-panel { 
            background: var(--bg-secondary); 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
        }
        .panel-title { font-size: 0.85rem; font-weight: 600; color: #9ca3af; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
        
        .canvas-container {
            width: 100%;
            height: 320px;
            background: #000;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        canvas, img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .placeholder-text { font-size: 0.8rem; color: #4b5563; text-align: center; padding: 20px; }

        /* PANEL STATISTIK */
        #analysis-result-panel { display: none; background: var(--bg-secondary); border-radius: 10px; border: 1px solid var(--border); padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 12px; }
